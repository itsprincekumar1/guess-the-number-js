<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Guess the number</title>
</head>
<body>
    <div class="top-row">
        <button id="reset">RESET</button>
        <p id="lifes-left">*****</p>
    </div>
    <h1 class="main-head">GUESS THE NUMBER</h1>
    <div class="middle-row">
        <p class="min-max">MIN <br> 1</p>
        <input type="number" id="user-input"><br>
        <p class="min-max">MAX <br> 20</p>
    </div>
    <div class="submit-btn">
        <button id="user-submit">SUBMIT</button>
    </div>
    <div class="last-row">
        <p id="result">ENTER YOUR GUESS</p>
    </div>
    <!-- <script src="script.js"></script> -->
</body>
</html>
